<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qx.dev95 ID</title>
    <style>
        :root {
            /* Mode Sombre Minimaliste (Noir Plein) */
            --bg: #000000; /* Fond noir pur */
            --card-bg: #111111; /* Fond de carte légèrement plus clair pour le contraste */
            --text: #ffffff; /* Texte blanc pur */
            --sub-text: #aaaaaa; /* Texte secondaire gris clair */
            --btn: linear-gradient(to right, #5e5ce6, #7d58ff); /* Conserver le dégradé du bouton pour le look premium */
            --toggle-bg: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            /* Mode Clair Minimaliste (Blanc Plein) */
            --bg: #ffffff; /* Fond blanc pur */
            --card-bg: #f9f9f9; /* Fond de carte légèrement plus sombre pour le contraste */
            --text: #000000; /* Texte noir pur */
            --sub-text: #666666; /* Texte secondaire gris foncé */
            --btn: linear-gradient(to right, #007aff, #0051ff); /* Conserver le dégradé du bouton */
            --toggle-bg: rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- Bouton Thème Interactif (SVG Inline) --- */
        .theme-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--toggle-bg);
            border: none;
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s ease;
            z-index: 1000;
        }

        .theme-btn svg {
            width: 28px; /* Légèrement plus grand pour correspondre au design fourni */
            height: 28px;
            /* Utilisation de currentColor pour que la couleur suive automatiquement le texte */
            fill: var(--text);
            transition: fill 0.3s ease;
        }

        /* Masquage alterné des icônes SVG */
        .moon-icon { display: block; }
        .sun-icon { display: none; }

        [data-theme="light"] .sun-icon { display: block; }
        [data-theme="light"] .moon-icon { display: none; }

        /* --- Contenu --- */
        .app-store-logo {
            width: 60px;
            height: 60px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-size: 32px; font-weight: 700; margin: 20px 0 10px 0; transition: color 0.3s ease; }
        .subtitle { color: var(--sub-text); text-align: center; font-size: 16px; max-width: 280px; line-height: 1.4; margin-bottom: 40px; transition: color 0.3s ease; }

        h2 { font-size: 22px; margin-bottom: 20px; transition: color 0.3s ease; }

        /* --- La Carte Design --- */
        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 350px;
            border-radius: 28px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }

        .split-image {
            width: 100%;
            height: 150px;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            margin-bottom: 20px;
        }

        .left-side { background-color: #55a845; flex: 1; display: flex; justify-content: center; align-items: center; font-size: 80px; }
        .right-side { background-color: #000; flex: 1; display: flex; justify-content: center; align-items: center; color: white; font-size: 60px; }

        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; transition: color 0.3s ease; }
        .card-desc { color: var(--sub-text); text-align: center; font-size: 14px; line-height: 1.5; margin-bottom: 25px; transition: color 0.3s ease; }

        .get-btn {
            background: var(--btn);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(94, 92, 230, 0.3);
        }
    </style>
</head>
<body id="body">

    <button class="theme-btn" onclick="toggleTheme()">
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,11.69A1,1,0,0,0,21.64,13Z"/></svg>
        
        <svg class="sun-icon" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="16.5"></circle>
            <rect x="44.5" y="10" width="11" height="23" rx="5.5"></rect> <rect x="44.5" y="67" width="11" height="23" rx="5.5"></rect> <rect x="10" y="44.5" width="23" height="11" rx="5.5"></rect> <rect x="67" y="44.5" width="23" height="11" rx="5.5"></rect> <rect x="20.5" y="24" width="23" height="11" rx="5.5" transform="rotate(-45 32 29.5)"></rect> <rect x="56.5" y="24" width="23" height="11" rx="5.5" transform="rotate(45 68 29.5)"></rect> <rect x="20.5" y="65" width="23" height="11" rx="5.5" transform="rotate(45 32 70.5)"></rect> <rect x="56.5" y="65" width="23" height="11" rx="5.5" transform="rotate(-45 68 70.5)"></rect> </svg>
    </button>

    <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/App_Store_Logo_2017.svg" class="app-store-logo">

    <h1>Qx.dev95</h1>
    <p class="subtitle">The best way to get any apps & games you want for free.</p>
    <h2>Apple IDs</h2>

    <div class="card">
        <div class="split-image">
            <div class="left-side">👾</div>
            <div class="right-side">tv</div>
        </div>
        
        <div class="card-title">Minecraft & Apple TV ID</div>
        <p class="card-desc">Vous pouvez obtenir Minecraft et Apple TV gratuitement. Votre expérience est sûre et fiable.</p>
        
        <button class="get-btn">Get</button>
    </div>

    <script>
        function toggleTheme() {
            const body = document.getElementById('body');
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>

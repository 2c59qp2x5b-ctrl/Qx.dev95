<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qx.dev95 ID</title>
    <style>
        :root {
            --bg: #0b0d11; /* Fond sombre profond type Coddly */
            --card-bg: rgba(255, 255, 255, 0.08); /* Boutons translucides */
            --text: #ffffff;
            --sub-text: #8e8e93;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- En-tête --- */
        .profile-img {
            width: 80px;
            height: 80px;
            background: linear-gradient(135.21deg, #161c2d 1.1%, #0b0d11 98.9%); /* Dégradé discret */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-img svg { width: 40px; height: 40px; fill: white; }

        h1 { font-size: 28px; font-weight: 700; margin: 0; }
        .description { color: var(--sub-text); text-align: center; font-size: 15px; margin: 15px 0 40px 0; max-width: 300px; line-height: 1.5; }

        /* --- Liste de Boutons (Style Coddly) --- */
        .links-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        .link-item {
            background-color: var(--card-bg);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, background 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .link-item:active { transform: scale(0.98); background-color: rgba(255, 255, 255, 0.12); }

        .link-icon { width: 30px; height: 30px; margin-right: 15px; display: flex; justify-content: center; align-items: center; }

        .link-text { font-size: 16px; font-weight: 500; flex-grow: 1; }

        /* --- Badge de Crédit --- */
        .footer-credit { margin-top: 50px; color: var(--sub-text); font-size: 12px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="profile-img">
        <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
    </div>

    <h1>Qx.dev95</h1>
    <p class="description">Experience the next level of Apple IDs. Secure, fast, and built for you.</p>

    <div class="links-container">
        <a href="#" class="link-item">
            <div class="link-icon"></div>
            <div class="link-text">Minecraft & Apple TV ID</div>
        </a>

        <a href="#" class="link-item">
            <div class="link-icon">▶️</div>
            <div class="link-text">YouTube Channel</div>
        </a>

        <a href="#" class="link-item">
            <div class="link-icon">💬</div>
            <div class="link-text">Contact Support</div>
        </a>
    </div>

    <div class="footer-credit">
        ⚡️ Made with <b>Qx.dev95</b>
    </div>

</body>
</html>
